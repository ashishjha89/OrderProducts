scalar BigDecimal

directive @key(fields: String!, resolvable: Boolean = true) repeatable on OBJECT | INTERFACE

type Query {
    products: [Product!]!
}

type Mutation {
    createProduct(input: CreateProductInput!): CreatedProduct!
}

type Product @key(fields: "id") @key(fields: "skuCode") {
    id: String!
    name: String!
    description: String!
    price: BigDecimal!
    skuCode: String
}

type CreatedProduct {
    productId: String!
}

input CreateProductInput {
    name: String!
    description: String!
    price: BigDecimal!
    skuCode: String!
}
